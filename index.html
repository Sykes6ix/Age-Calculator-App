<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  
  <title> Age calculator app</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
      <form id="form">
          <div class="field">
            <label for="day">DAY</label>
            <input type="number" id="day" min="1"  placeholder="DD">
            <small class="error">This field is required</small>
          </div>

          <div class="field">
            <label for="month">MONTH</label>
            <input type="number" id="month" min="1"  placeholder="MM">
            <small class="error">This field is required</small>
          </div>

          <div class="field">
            <label for="year">YEAR</label>
            <input type="number" id="year" placeholder="YYYY">
            <small class="error">This field is required</small>
          </div>  
       </form>
        
        <div class="line-container">
          <hr> 
        
          <button id="button" type="button" onclick="getAge()">
               <img src="assets/images/icon-arrow.svg">
             </button>
        </div>

        <div class="result">
          <div>  <span  class="year-result">_ _ </span> years</div>
          <div>  <span class="month-result">_ _ </span> months</div>
          <div>  <span  class="date-result">_ _ </span> days</div>
        </div>
 
    </main>

</body>
</html>
